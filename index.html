<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>🎁 Gokkast</title>
<style>
  :root{
    --bg-dark:#0b0f0d;
    --bg-panel:#12201a;
    --green:#1f8f5c;
    --green-bright:#33d488;
    --gold:#e8c15a;
    --gold-bright:#ffd76e;
    --red:#c8443b;
    --text:#eef4ef;
    --text-dim:#9db3a6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    margin:0;
    background:
      radial-gradient(circle at 50% 0%, #163224 0%, var(--bg-dark) 65%);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    color:var(--text);
    overflow:hidden;
    touch-action:manipulation;
  }
  #app{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    position:relative;
  }

  h1{
    font-size:clamp(20px,6vw,30px);
    margin:0 0 18px 0;
    letter-spacing:1px;
    color:var(--gold-bright);
    text-shadow:0 0 12px rgba(255,215,110,.35);
    text-align:center;
  }

  /* Machine */
  #machine{
    background:linear-gradient(160deg, #17281f, var(--bg-panel));
    border:3px solid #2c4a38;
    border-radius:22px;
    padding:22px 18px 26px;
    box-shadow:
      0 0 0 6px rgba(31,143,92,.08),
      0 20px 50px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,.05);
    width:min(92vw, 380px);
    position:relative;
  }

  #lights{
    position:absolute;
    top:-10px; left:0; right:0;
    display:flex;
    justify-content:space-around;
    padding:0 14px;
  }
  .bulb{
    width:8px; height:8px; border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 6px var(--gold);
    animation:blink 1.1s infinite;
  }
  .bulb:nth-child(odd){animation-delay:.55s;}
  @keyframes blink{
    0%,100%{opacity:.25; box-shadow:0 0 3px var(--gold);}
    50%{opacity:1; box-shadow:0 0 10px var(--gold-bright);}
  }

  #reels{
    display:flex;
    gap:10px;
    background:#081411;
    border-radius:14px;
    padding:12px;
    border:2px solid #24392e;
    box-shadow:inset 0 4px 14px rgba(0,0,0,.6);
  }
  .reel-window{
    flex:1;
    height:96px;
    overflow:hidden;
    border-radius:10px;
    background:linear-gradient(180deg,#000 0%, #0e1b16 15%, #142a20 50%, #0e1b16 85%, #000 100%);
    position:relative;
    border:1px solid #1f342a;
  }
  .reel-window::before, .reel-window::after{
    content:'';
    position:absolute; left:0; right:0; height:28px;
    z-index:2; pointer-events:none;
  }
  .reel-window::before{ top:0; background:linear-gradient(180deg, rgba(0,0,0,.85), transparent); }
  .reel-window::after{ bottom:0; background:linear-gradient(0deg, rgba(0,0,0,.85), transparent); }
  .reel-strip{
    display:flex;
    flex-direction:column;
    will-change:transform;
  }
  .symbol{
    height:96px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:44px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }

  #payline{
    position:absolute;
    left:8px; right:8px; top:50%;
    height:2px;
    background:rgba(232,193,90,.35);
    transform:translateY(-1px);
    pointer-events:none;
  }

  #status{
    text-align:center;
    min-height:26px;
    margin-top:14px;
    font-size:15px;
    color:var(--text-dim);
    letter-spacing:.3px;
  }

  #lever-wrap{
    display:flex;
    justify-content:center;
    margin-top:18px;
  }
  #spin-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;
    color:#0c1a13;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, #c69f3d);
    padding:16px 44px;
    border-radius:50px;
    box-shadow:
      0 6px 0 #8a6d24,
      0 12px 22px rgba(0,0,0,.45);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  #spin-btn:active{
    transform:translateY(5px);
    box-shadow:0 1px 0 #8a6d24, 0 4px 10px rgba(0,0,0,.4);
  }
  #spin-btn:disabled{
    opacity:.55;
    cursor:default;
  }

  /* Win overlay */
  #win-overlay{
    position:fixed; inset:0;
    background:rgba(3,8,6,.94);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:18px;
    opacity:0; pointer-events:none;
    transition:opacity .4s ease;
    z-index:50;
    padding:20px;
  }
  #win-overlay.show{ opacity:1; pointer-events:auto; }
  #win-text{
    font-size:clamp(26px,8vw,40px);
    font-weight:800;
    color:var(--gold-bright);
    text-shadow:0 0 20px rgba(255,215,110,.6);
    text-align:center;
    animation:pop .5s ease;
  }
  @keyframes pop{
    0%{transform:scale(.4); opacity:0;}
    60%{transform:scale(1.08); opacity:1;}
    100%{transform:scale(1);}
  }
  #video-wrap{
    width:min(92vw, 420px);
    aspect-ratio:9/16;
    max-height:70vh;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    display:none;
  }
  #video-wrap.ready{ display:block; }
  #cadeau-video{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  #replay-btn{
    background:none;
    border:1px solid var(--text-dim);
    color:var(--text);
    padding:10px 22px;
    border-radius:30px;
    font-size:14px;
    cursor:pointer;
    display:none;
  }
  #replay-btn.show{ display:inline-block; }

  #confetti-canvas{
    position:fixed; inset:0;
    pointer-events:none;
    z-index:60;
  }

  #tap-hint{
    font-size:13px;
    color:var(--text-dim);
    margin-top:6px;
    text-align:center;
    display:none;
  }
  #tap-hint.show{ display:block; }
</style>
</head>
<body>

<div id="app">
  <h1>🎁 Gezel Meesterkok Cadeau 🎁</h1>

  <div id="machine">
    <div id="lights">
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    </div>

    <div id="reels">
      <div class="reel-window"><div class="reel-strip" id="strip0"></div></div>
      <div class="reel-window"><div class="reel-strip" id="strip1"></div></div>
      <div class="reel-window"><div class="reel-strip" id="strip2"></div></div>
      <div id="payline"></div>
    </div>

    <div id="status">Druk op de knop en waag je kans!</div>

    <div id="lever-wrap">
      <button id="spin-btn">TREK 🎰</button>
    </div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-overlay">
  <div id="win-text">Gefeliciteerd Tom</div>
  <div id="video-wrap"><video id="cadeau-video" playsinline webkit-playsinline></video></div>
  <div id="tap-hint">Tik op het scherm om het geluid aan te zetten</div>
  <button id="replay-btn">↺ Nog een keer</button>
</div>

<script>
(function(){
  // ---------- Config ----------
  var SYMBOLS = ['🍒','⭐','🔔','💎','7️⃣','🎁']; // laatste = jackpot symbool
  var WINNING_SYMBOL = '🎁';
  var SYMBOL_H = 96;
  var VISIBLE_ROWS = 1; // window shows 1 centered row (with blur above/below via gradient)
  var STRIP_LENGTH = 24; // aantal symbolen per strip (lang genoeg om te "spinnen")
  var VIDEO_SRC = 'cadeau.mp4'; // <-- zet dit bestand in dezelfde GitHub-repo als deze HTML

  var strips = [document.getElementById('strip0'), document.getElementById('strip1'), document.getElementById('strip2')];
  var spinBtn = document.getElementById('spin-btn');
  var statusEl = document.getElementById('status');
  var winOverlay = document.getElementById('win-overlay');
  var videoWrap = document.getElementById('video-wrap');
  var video = document.getElementById('cadeau-video');
  var replayBtn = document.getElementById('replay-btn');
  var tapHint = document.getElementById('tap-hint');

  function randSymbol(exclude){
    var pool = SYMBOLS.filter(function(s){ return s !== exclude; });
    return pool[Math.floor(Math.random()*pool.length)];
  }

  // Bouw elke strip: willekeurige symbolen, met WINNING_SYMBOL als laatste (die stopt in het venster)
  function buildStrip(el){
    el.innerHTML = '';
    el.style.transform = 'translateY(0px)';
    for(var i=0;i<STRIP_LENGTH-1;i++){
      var d = document.createElement('div');
      d.className='symbol';
      d.textContent = randSymbol();
      el.appendChild(d);
    }
    var win = document.createElement('div');
    win.className='symbol';
    win.textContent = WINNING_SYMBOL;
    el.appendChild(win);
  }

  strips.forEach(buildStrip);

  var spinning = false;

  function vibrate(pattern){
    if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} }
  }

  // simpele "tik" geluidjes via WebAudio, geen extern bestand nodig
  var audioCtx = null;
  function beep(freq, dur, vol, delay){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      var t0 = audioCtx.currentTime + (delay||0);
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type='triangle';
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(vol||0.15, t0+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+(dur||0.2));
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0+(dur||0.2)+0.02);
    }catch(e){}
  }

  function spin(){
    if(spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    statusEl.textContent = 'Bezig...';
    vibrate(15);

    var delays = [0, 350, 700]; // reels stoppen na elkaar
    var durations = [1400, 1750, 2100];

    strips.forEach(function(el, idx){
      // rebuild met verse random symbolen zodat het elke keer anders oogt
      buildStrip(el);
      var finalOffset = (STRIP_LENGTH-1) * SYMBOL_H; // positie van jackpot-symbool
      el.style.transition = 'none';
      el.style.transform = 'translateY(0px)';
      // forceer reflow
      void el.offsetHeight;

      setTimeout(function(){
        el.style.transition = 'transform ' + durations[idx] + 'ms cubic-bezier(.15,.85,.25,1)';
        el.style.transform = 'translateY(-' + finalOffset + 'px)';
      }, 30);

      setTimeout(function(){
        beep(520 - idx*60, 0.12, 0.12);
        vibrate(10);
      }, delays[idx] + durations[idx] - 60);
    });

    var totalTime = Math.max.apply(null, durations) + 250;
    setTimeout(function(){
      spinning = false;
      spinBtn.disabled = false;
      statusEl.textContent = 'Gewonnen! 🎉';
      vibrate([0,40,60,40,60,80]);
      showWin();
    }, totalTime);
  }

  spinBtn.addEventListener('click', spin);

  // ---------- Win / video reveal ----------
  function showWin(){
    winOverlay.classList.add('show');
    fireConfetti();

    video.src = VIDEO_SRC;
    video.muted = true; // muted autoplay is toegestaan op mobiel
    video.loop = false;
    video.controls = false;

    video.addEventListener('error', function onErr(){
      videoWrap.classList.remove('ready');
      var msg = document.createElement('div');
      msg.style.color = '#e8c15a';
      msg.style.fontSize = '14px';
      msg.style.textAlign = 'center';
      msg.style.maxWidth = '80vw';
      msg.textContent = 'Video "' + VIDEO_SRC + '" niet gevonden. Zet dit bestand naast gokkast.html in dezelfde repo.';
      winOverlay.insertBefore(msg, replayBtn);
      video.removeEventListener('error', onErr);
    }, { once:true });

    videoWrap.classList.add('ready');

    video.play().then(function(){
      tapHint.classList.add('show');
    }).catch(function(){
      tapHint.classList.add('show');
    });

    video.addEventListener('ended', function(){
      replayBtn.classList.add('show');
    }, { once:true });
  }

  // tik ergens op overlay om geluid aan te zetten
  winOverlay.addEventListener('click', function(e){
    if(e.target === replayBtn) return;
    if(video.muted){
      video.muted = false;
      tapHint.classList.remove('show');
    }
  });

  replayBtn.addEventListener('click', function(e){
    e.stopPropagation();
    video.currentTime = 0;
    video.muted = false;
    video.play().catch(function(){});
    replayBtn.classList.remove('show');
  });

  // ---------- Confetti ----------
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  var confettiPieces = [];
  var confettiRunning = false;

  function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  var confettiColors = ['#e8c15a','#33d488','#ffd76e','#c8443b','#eef4ef','#1f8f5c'];

  function fireConfetti(){
    confettiPieces = [];
    var count = 140;
    for(var i=0;i<count;i++){
      confettiPieces.push({
        x: Math.random()*canvas.width,
        y: -20 - Math.random()*canvas.height*0.5,
        r: 4 + Math.random()*5,
        vy: 2 + Math.random()*3.5,
        vx: (Math.random()-0.5)*2.5,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.3,
        color: confettiColors[Math.floor(Math.random()*confettiColors.length)],
        shape: Math.random() < 0.5 ? 'rect':'circle'
      });
    }
    if(!confettiRunning){
      confettiRunning = true;
      requestAnimationFrame(confettiLoop);
    }
    setTimeout(function(){ confettiRunning=false; }, 4200);
  }

  function confettiLoop(){
    ctx.clearRect(0,0,canvas.width, canvas.height);
    var alive = false;
    confettiPieces.forEach(function(p){
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      if(p.y < canvas.height+20) alive = true;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape==='rect'){
        ctx.fillRect(-p.r, -p.r*0.6, p.r*2, p.r*1.2);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.r,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
    if(confettiRunning || alive){
      requestAnimationFrame(confettiLoop);
    } else {
      ctx.clearRect(0,0,canvas.width, canvas.height);
    }
  }

})();
</script>

</body>
</html>
